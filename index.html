<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Variación - Colores Invertidos</title>
    <style>
        :root {
            --primary-bg: #f5f8fa;
            --navbar-blue: #1e62d4;
            --white: #ffffff;
            --text-main: #333333;
            --text-label: #888888;
            --subio-color: #10b981; /* Verde */
            --bajo-color: #ef4444;  /* Rojo */
            --footer-dark: #1f2937;
            --border-light: #e6ebf1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            background-color: var(--primary-bg);
            color: var(--text-main);
            padding-bottom: 90px;
        }

        .top-navbar {
            background-color: var(--white);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
        }

        .add-button-container {
            background-color: var(--navbar-blue);
            padding: 10px;
            text-align: center;
        }

        .add-button {
            background: transparent;
            color: var(--white);
            border: none;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 0.95rem;
        }

        #product-list {
            padding: 15px;
            max-width: 900px;
            margin: auto;
        }

        .product-card {
            background: var(--white);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 15px;
        }

        .remove-card {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f1f5f9;
            color: #64748b;
            border: none;
            border-radius: 4px;
            padding: 3px 7px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .card-body {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            .card-body { grid-template-columns: 1.5fr 1fr 1.5fr; }
        }

        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; color: var(--text-label); font-weight: bold; margin-bottom: 5px; }

        .input-field {
            padding: 10px;
            border: 1px solid #d1d9e6;
            border-radius: 5px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        .iva-selector {
            font-size: 0.65rem;
            padding: 4px;
            margin-bottom: 5px;
            border-radius: 4px;
            border: 1px solid var(--navbar-blue);
            color: var(--navbar-blue);
            font-weight: bold;
            background: #f0f7ff;
        }

        .iva-ref { font-size: 0.7rem; color: #999; margin-top: 5px; line-height: 1.3; }
        .iva-ref b { color: #555; }

        .card-results {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: #fcfdfe;
            border-top: 1px solid #eee;
            margin: 15px -15px -15px -15px;
            border-radius: 0 0 8px 8px;
            align-items: center;
        }

        .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: bold; color: white; }
        .bg-subio { background: var(--subio-color); }
        .bg-bajo { background: var(--bajo-color); }

        .text-subio { color: var(--subio-color) !important; }
        .text-bajo { color: var(--bajo-color) !important; }

        .footer-fixed {
            position: fixed; bottom: 0; width: 100%; background: var(--footer-dark);
            color: white; padding: 15px; display: flex; justify-content: space-between;
            box-sizing: border-box; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="top-navbar"><h1>📊 Monitor de Variación</h1></div>
    <div class="add-button-container">
        <button class="add-button" onclick="addProductCard()">+ Agregar Producto / Servicio</button>
    </div>

    <div id="product-list"></div>

    <div class="footer-fixed">
        <div>Total Nuevo (c/IVA):<br><strong id="global-total-new">Q 0.00</strong></div>
        <div style="text-align: right;">Variación Global:<br><strong id="global-variation">0.00%</strong></div>
    </div>

    <script>
        const formatMoney = (v) => new Intl.NumberFormat('es-GT', { style: 'currency', currency: 'GTQ' }).format(v);

        function calculateCard(id) {
            const card = document.getElementById(id);
            const modeNue = card.querySelector('.mode-nue').value;
            const pAntVal = parseFloat(card.querySelector('.p-ant').value) || 0;
            const pNueVal = parseFloat(card.querySelector('.p-nue').value) || 0;

            let antNeto = pAntVal;
            let antTotal = pAntVal * 1.12;
            card.querySelector('.ref-ant').innerHTML = `(Total c/ IVA: <b>${formatMoney(antTotal)}</b>)`;

            let nueNeto, nueTotal;
            if (modeNue === "con") {
                nueNeto = pNueVal / 1.12;
                nueTotal = pNueVal;
                card.querySelector('.ref-nue').innerHTML = `(Precio sin IVA: <b>${formatMoney(nueNeto)}</b>)`;
            } else {
                nueNeto = pNueVal;
                nueTotal = pNueVal * 1.12;
                card.querySelector('.ref-nue').innerHTML = `(Total c/ IVA: <b>${formatMoney(nueTotal)}</b>)`;
            }

            card.dataset.totalNue = nueTotal;
            card.dataset.totalAnt = antTotal;

            if (antNeto > 0 && nueNeto > 0) {
                const diff = nueNeto - antNeto;
                const varPct = (diff / antNeto) * 100;

                card.querySelector('.dif-val').innerText = formatMoney(diff);
                const varDisplay = card.querySelector('.var-val');
                varDisplay.innerText = (varPct >= 0 ? '+' : '') + varPct.toFixed(2) + '%';
                
                // Color Lógica: Subió = Verde, Bajó = Rojo
                varDisplay.className = "var-val " + (varPct > 0 ? "text-subio" : (varPct < 0 ? "text-bajo" : ""));

                const alertArea = card.querySelector('.alert-area');
                // Alerta si es 3% o más (subida o bajada)
                if (Math.abs(varPct) >= 3) {
                    const badgeClass = varPct > 0 ? 'bg-subio' : 'bg-bajo';
                    const texto = varPct > 0 ? 'SUBIÓ 3%+' : 'BAJÓ 3%+';
                    alertArea.innerHTML = `<span class="badge ${badgeClass}">${texto}</span>`;
                } else { alertArea.innerHTML = ''; }
            } else {
                card.querySelector('.dif-val').innerText = "Q 0.00";
                card.querySelector('.var-val').innerText = "0.00%";
                card.querySelector('.alert-area').innerHTML = '';
            }

            updateGlobal();
        }

        function updateGlobal() {
            let totalAnt = 0, totalNue = 0;
            document.querySelectorAll('.product-card').forEach(c => {
                totalAnt += parseFloat(c.dataset.totalAnt) || 0;
                totalNue += parseFloat(c.dataset.totalNue) || 0;
            });
            document.getElementById('global-total-new').innerText = formatMoney(totalNue);
            const globalVar = totalAnt > 0 ? ((totalNue - totalAnt) / totalAnt) * 100 : 0;
            const gVarDisp = document.getElementById('global-variation');
            gVarDisp.innerText = (globalVar >= 0 ? '+' : '') + globalVar.toFixed(2) + '%';
            
            // Color global también invertido
            gVarDisp.className = globalVar > 0 ? "text-subio" : (globalVar < 0 ? "text-bajo" : "");
        }

        function addProductCard() {
            const id = 'card_' + Date.now();
            const div = document.createElement('div');
            div.className = 'product-card';
            div.id = id;
            div.innerHTML = `
                <button class="remove-card" onclick="document.getElementById('${id}').remove(); updateGlobal();">✕</button>
                <div class="card-body">
                    <div class="input-group">
                        <label>Nombre del Producto</label>
                        <input type="text" class="input-field" placeholder="Nombre...">
                    </div>
                    <div class="input-group">
                        <label>Precio Anterior (Sin IVA)</label>
                        <input type="number" class="input-field p-ant" oninput="calculateCard('${id}')" placeholder="Q">
                        <span class="iva-ref ref-ant">(Total c/ IVA: Q 0.00)</span>
                    </div>
                    <div class="input-group">
                        <label>Precio Nuevo</label>
                        <select class="mode-nue iva-selector" onchange="calculateCard('${id}')">
                            <option value="sin">INGRESAR SIN IVA</option>
                            <option value="con">INGRESAR CON IVA</option>
                        </select>
                        <input type="number" class="input-field p-nue" oninput="calculateCard('${id}')" placeholder="Q">
                        <span class="iva-ref ref-nue">(Referencia IVA)</span>
                    </div>
                </div>
                <div class="card-results">
                    <div style="font-size:0.8rem">Dif. Neta: <strong class="dif-val">Q 0.00</strong></div>
                    <div class="alert-area"></div>
                    <div style="font-weight:bold" class="var-val">0.00%</div>
                </div>`;
            document.getElementById('product-list').prepend(div);
        }
        addProductCard();
    </script>
</body>
</html>
