<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Precios GT</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #f59e0b;
            --bg: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 15px;
            padding-bottom: 120px; /* Espacio para el resumen fijo */
        }

        h2 { font-size: 1.4rem; color: #1e293b; text-align: center; margin-bottom: 20px; }

        /* Estilo de Tarjetas para Celular */
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .alert-active { 
            border-color: var(--warning);
            background-color: #fffbeb;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        
        .desc-input {
            border: none;
            border-bottom: 1px solid #e2e8f0;
            font-weight: bold;
            font-size: 1rem;
            width: 80%;
            padding: 5px 0;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            background: #f8fafc;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #e2e8f0;
            font-size: 0.9rem;
        }

        /* Botones */
        .btn-add {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .btn-del {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Resumen Fijo Inferior */
        .footer-summary {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .stat-group div { font-size: 0.8rem; opacity: 0.8; }
        .stat-group span { font-size: 1.1rem; font-weight: bold; }

        .perc-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            width: 90%;
        }

        .toast {
            background: #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
            border-left: 5px solid var(--warning);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<h2>📊 Monitor de Variación</h2>

<button class="btn-add" onclick="addCard()">+ Agregar Producto / Servicio</button>

<div id="cardsContainer"></div>

<div class="footer-summary">
    <div class="stat-group">
        <div>Total Nuevo</div>
        <span id="totalNew">Q0.00</span>
    </div>
    <div style="text-align: right;">
        <div>Variación Global</div>
        <span id="totalPerc">0.00%</span>
    </div>
</div>

<script>
    let notifiedCards = new Set();

    function addCard() {
        const id = 'card_' + Math.random().toString(36).substr(2, 9);
        const html = `
            <div class="card" id="${id}">
                <div class="card-header">
                    <input type="text" class="desc-input" placeholder="Nombre (Ej. Luz, Gas)">
                    <button class="btn-del" onclick="removeCard('${id}')">✕</button>
                </div>
                <div class="grid-inputs">
                    <div>
                        <label>Precio Anterior</label>
                        <input type="number" class="old-p" placeholder="Q" step="0.01" inputmode="decimal" oninput="calculate('${id}')">
                    </div>
                    <div>
                        <label>Precio Nuevo</label>
                        <input type="number" class="new-p" placeholder="Q" step="0.01" inputmode="decimal" oninput="calculate('${id}')">
                    </div>
                </div>
                <div class="result-row">
                    <span>Diferencia: <strong class="diff-val">Q0.00</strong></span>
                    <span class="perc-val">0.00%</span>
                </div>
            </div>
        `;
        document.getElementById('cardsContainer').insertAdjacentHTML('afterbegin', html);
    }

    function removeCard(id) {
        document.getElementById(id).remove();
        notifiedCards.delete(id);
        updateGlobal();
    }

    function calculate(id) {
        const card = document.getElementById(id);
        const oldP = parseFloat(card.querySelector('.old-p').value);
        const newP = parseFloat(card.querySelector('.new-p').value);
        const desc = card.querySelector('.desc-input').value || "Producto";

        if (oldP > 0 && newP > 0) {
            const diff = newP - oldP;
            const perc = (diff / oldP) * 100;
            const absPerc = Math.abs(perc);

            card.querySelector('.diff-val').innerText = `Q${diff.toFixed(2)}`;
            const percEl = card.querySelector('.perc-val');
            
            if (absPerc >= 3) {
                card.classList.add('alert-active');
                percEl.innerHTML = `<span class="perc-badge" style="background:var(--warning); color:white;">${perc.toFixed(2)}%</span>`;
                
                if (!notifiedCards.has(id)) {
                    showToast(`⚠️ Variación de ${perc.toFixed(2)}% en ${desc}`);
                    notifiedCards.add(id);
                    if (window.navigator.vibrate) window.navigator.vibrate(100); // Vibración si está disponible
                }
            } else {
                card.classList.remove('alert-active');
                notifiedCards.delete(id);
                const color = perc > 0 ? 'var(--danger)' : (perc < 0 ? 'var(--success)' : '#64748b');
                percEl.innerHTML = `<span style="color:${color}; font-weight:bold">${perc.toFixed(2)}%</span>`;
            }
        }
        updateGlobal();
    }

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    function updateGlobal() {
        let tOld = 0, tNew = 0;
        document.querySelectorAll('.card').forEach(card => {
            const vO = parseFloat(card.querySelector('.old-p').value) || 0;
            const vN = parseFloat(card.querySelector('.new-p').value) || 0;
            if (vO > 0 && vN > 0) { tOld += vO; tNew += vN; }
        });

        document.getElementById('totalNew').innerText = `Q${tNew.toFixed(2)}`;
        
        const percEl = document.getElementById('totalPerc');
        if (tOld > 0) {
            const pG = ((tNew - tOld) / tOld) * 100;
            percEl.innerText = `${pG.toFixed(2)}%`;
            percEl.style.color = pG > 0 ? '#ff8a8a' : '#8aff8a';
        } else {
            percEl.innerText = "0.00%";
        }
    }

    // Iniciar con una tarjeta
    window.onload = addCard;
</script>

</body>
</html>
