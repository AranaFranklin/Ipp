<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor PRO - Precisión y Limpieza</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --primary: #1e62d4;
            --white: #ffffff;
            --up: #10b981; 
            --down: #ef4444; 
            --warning: #f59e0b;
            --dark: #1e293b;
            --danger: #dc2626;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 110px; color: #334155; }
        
        .navbar { background: var(--white); padding: 15px; text-align: center; border-bottom: 1px solid #e2e8f0; font-weight: bold; }
        .controls { background: var(--primary); padding: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 0.85rem; transition: 0.2s; }
        .btn-add { background: rgba(255,255,255,0.2); border: 1px solid white; }
        .btn-report { background: var(--warning); }
        .btn-clear { background: var(--danger); border: 1px solid rgba(0,0,0,0.1); }
        .btn-clear:hover { background: #b91c1c; }

        #product-list { padding: 15px; max-width: 850px; margin: auto; }
        .card { background: var(--white); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .card-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
        @media (min-width: 600px) { .card-grid { grid-template-columns: 1.5fr 1fr 1.5fr; } }

        input, select { padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        label { font-size: 0.75rem; font-weight: bold; color: #64748b; display: block; margin-bottom: 5px; }
        
        .check-same { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; color: var(--primary); cursor: pointer; margin-bottom: 12px; border: 1px dashed var(--primary); }
        
        .iva-ref { font-size: 0.75rem; color: #94a3b8; margin-top: 6px; display: block; min-height: 1.2em; }
        .res-val { font-size: 1.1rem; font-weight: 800; color: #94a3b8; }
        .dif-text { font-size: 0.85rem; font-weight: 600; display: block; margin-top: 2px; }
        
        .text-up { color: var(--up); }
        .text-down { color: var(--down); }

        #report-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .report-window { background: white; max-width: 600px; margin: auto; border-radius: 15px; padding: 25px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f8fafc; font-size: 0.9rem; }

        .footer { position: fixed; bottom: 0; width: 100%; background: var(--dark); color: white; padding: 15px 25px; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 100; }
    </style>
</head>
<body>

    <div class="navbar">MONITOR DE VARIACIÓN PRO</div>
    
    <div class="controls">
        <button class="btn btn-add" onclick="addCard()">+ AGREGAR</button>
        <button class="btn btn-report" onclick="showReport()">📋 INFORME</button>
        <button class="btn btn-clear" onclick="clearAll()">🗑️ BORRAR TODO</button>
    </div>

    <div id="product-list"></div>

    <div id="report-overlay">
        <div class="report-window">
            <h2 style="margin-top:0; color:var(--primary); border-bottom: 3px solid var(--primary); padding-bottom:10px;">Análisis Final</h2>
            <div id="rep-summary" style="background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:20px;"></div>
            <div id="list-up"></div>
            <div id="list-down"></div>
            <div id="list-equal"></div>
            <button class="btn" style="width:100%; background:var(--dark); margin-top:25px; padding:18px;" onclick="document.getElementById('report-overlay').style.display='none'">CERRAR</button>
        </div>
    </div>

    <div class="footer">
        <div>TOTAL NUEVO (C/IVA):<br><strong id="foot-total" style="font-size:1.2rem">Q 0.00</strong></div>
        <div style="text-align:right">VARIACIÓN GLOBAL:<br><strong id="foot-var" style="font-size:1.2rem">0.00%</strong></div>
    </div>

    <script>
        const formatQ = (n) => new Intl.NumberFormat('es-GT', { style: 'currency', currency: 'GTQ' }).format(n);
        const round2 = (num) => Math.round((num + Number.EPSILON) * 100) / 100;

        function clearAll() {
            if (confirm("¿Estás seguro de que quieres borrar TODOS los productos ingresados? Esta acción no se puede deshacer.")) {
                document.getElementById('product-list').innerHTML = "";
                addCard(); // Agregar una tarjeta limpia después de borrar
                calcGlobal();
            }
        }

        function update(id) {
            const card = document.getElementById(id);
            if(!card) return;
            const pAntInput = card.querySelector('.p-ant');
            const pNueInput = card.querySelector('.p-nue');
            const sameCheck = card.querySelector('.is-same').checked;
            const modeNue = card.querySelector('.mode').value;

            if (sameCheck) {
                pNueInput.value = pAntInput.value;
                pNueInput.disabled = true;
                pNueInput.style.background = "#f1f5f9";
                card.querySelector('.mode').value = "sin";
            } else {
                pNueInput.disabled = false;
                pNueInput.style.background = "#ffffff";
            }

            const vAnt = parseFloat(pAntInput.value) || 0;
            const vNueRaw = parseFloat(pNueInput.value) || 0;

            let tAnt = round2(vAnt * 1.12);
            let nNeto = (modeNue === "con") ? round2(vNueRaw / 1.12) : round2(vNueRaw);
            let tNue = (modeNue === "con") ? round2(vNueRaw) : round2(vNueRaw * 1.12);

            card.querySelector('.ref-ant').innerHTML = vAnt > 0 ? `(Total c/IVA: <b>${formatQ(tAnt)}</b>)` : '';
            const refNue = card.querySelector('.ref-nue');
            if (vNueRaw > 0) {
                refNue.innerHTML = (modeNue === "sin") ? `(Total c/IVA: <b>${formatQ(tNue)}</b>)` : `(Precio sin IVA: <b>${formatQ(nNeto)}</b>)`;
            } else { refNue.innerHTML = ''; }

            const resDisplay = card.querySelector('.res-val');
            const diffDisplay = card.querySelector('.dif-text');
            const alertArea = card.querySelector('.alert-area');

            if (vAnt > 0 && vNueRaw > 0) {
                const diferenciaQ = round2(nNeto - vAnt);
                const variacion = vAnt !== 0 ? (diferenciaQ / vAnt) * 100 : 0;
                card.dataset.pct = variacion;
                card.dataset.tAnt = tAnt;
                card.dataset.tNue = tNue;
                card.dataset.ready = "true";

                const finalPct = Math.abs(diferenciaQ) < 0.01 ? 0 : variacion;
                resDisplay.innerText = (finalPct >= 0 ? '+' : '') + finalPct.toFixed(2) + '%';
                diffDisplay.innerText = `Cantidad de variación: ${formatQ(diferenciaQ)}`;
                
                const colorClass = finalPct > 0 ? "text-up" : (finalPct < 0 ? "text-down" : "");
                resDisplay.className = "res-val " + colorClass;
                diffDisplay.className = "dif-text " + colorClass;

                if (Math.abs(finalPct) >= 3) {
                    alertArea.innerHTML = `<span style="background:${finalPct > 0 ? 'var(--up)' : 'var(--down)'}; color:white; padding:3px 8px; border-radius:20px; font-size:0.65rem; font-weight:bold;">ALERTA 3%+</span>`;
                } else { alertArea.innerHTML = ''; }
            } else {
                card.dataset.ready = "false";
                resDisplay.innerText = "Esperando precios...";
                diffDisplay.innerText = "";
                resDisplay.className = "res-val";
                alertArea.innerHTML = '';
            }
            card.dataset.name = card.querySelector('.name').value || "Producto";
            calcGlobal();
        }

        function calcGlobal() {
            let tA = 0, tN = 0;
            const readyCards = document.querySelectorAll('.card[data-ready="true"]');
            readyCards.forEach(c => {
                tA += parseFloat(c.dataset.tAnt) || 0;
                tN += parseFloat(c.dataset.tNue) || 0;
            });
            document.getElementById('foot-total').innerText = formatQ(tN);
            const gDiff = round2(tN - tA);
            const gVar = tA > 0 ? (gDiff / tA) * 100 : 0;
            const fV = document.getElementById('foot-var');
            fV.innerText = (gVar >= 0 ? '+' : '') + gVar.toFixed(2) + '%';
            fV.className = gVar > 0 ? "text-up" : (gVar < 0 ? "text-down" : "");
        }

        function showReport() {
            const cards = document.querySelectorAll('.card[data-ready="true"]');
            if (cards.length === 0) return alert("Ingresa ambos precios para analizar.");
            const lUp = document.getElementById('list-up'), lDown = document.getElementById('list-down'), lEqual = document.getElementById('list-equal');
            const summary = document.getElementById('rep-summary');
            lUp.innerHTML = ""; lDown.innerHTML = ""; lEqual.innerHTML = "";
            let impactMoney = 0;

            cards.forEach(c => {
                const pct = parseFloat(c.dataset.pct) || 0;
                const diffMoney = round2(parseFloat(c.dataset.tNue) - parseFloat(c.dataset.tAnt));
                impactMoney += diffMoney;
                const row = `<div class="item-row"><span><b>${c.dataset.name}</b></span><span class="${pct > 0.005 ? 'text-up' : (pct < -0.005 ? 'text-down' : '')}">${formatQ(diffMoney)} (${pct.toFixed(2)}%)</span></div>`;
                if (pct > 0.005) lUp.innerHTML += row;
                else if (pct < -0.005) lDown.innerHTML += row;
                else lEqual.innerHTML += row;
            });
            summary.innerHTML = `<p style="margin:0;"><b>Impacto Total:</b> <span class="${impactMoney > 0.005 ? 'text-up' : (impactMoney < -0.005 ? 'text-down' : '')}">${formatQ(impactMoney)}</span></p>`;
            document.getElementById('report-overlay').style.display = "block";
        }

        function addCard() {
            const id = 'c' + Date.now();
            const div = document.createElement('div');
            div.className = 'card'; div.id = id;
            div.dataset.ready = "false";
            div.innerHTML = `
                <button onclick="document.getElementById('${id}').remove();calcGlobal();" style="position:absolute;top:15px;right:15px;border:none;background:none;font-size:1.5rem;color:#cbd5e1;cursor:pointer;">✕</button>
                <input type="text" class="name" placeholder="Nombre del Producto..." oninput="update('${id}')" style="margin-bottom:15px; font-weight:bold; border:none; border-bottom:2px solid #f1f5f9; border-radius:0;">
                <label class="check-same"><input type="checkbox" class="is-same" onchange="update('${id}')"> ¿ES EL MISMO PRECIO?</label>
                <div class="card-grid">
                    <div class="input-group">
                        <label>ANTERIOR (NETO)</label>
                        <input type="number" class="p-ant" oninput="update('${id}')" placeholder="Q">
                        <span class="iva-ref ref-ant"></span>
                    </div>
                    <div class="input-group">
                        <label>MODO PRECIO NUEVO</label>
                        <select class="mode" onchange="update('${id}')"><option value="sin">SIN IVA</option><option value="con">CON IVA</option></select>
                    </div>
                    <div class="input-group">
                        <label>VALOR NUEVO</label>
                        <input type="number" class="p-nue" oninput="update('${id}')" placeholder="Q">
                        <span class="iva-ref ref-nue"></span>
                    </div>
                </div>
                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong class="res-val">Esperando precios...</strong>
                        <span class="dif-text"></span>
                    </div>
                    <div class="alert-area"></div>
                </div>`;
            document.getElementById('product-list').prepend(div);
        }
        addCard();
    </script>
</body>
</html>
